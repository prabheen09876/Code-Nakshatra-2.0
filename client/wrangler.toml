name = "accredify-pages"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Local secrets: create .dev.vars (see .dev.vars.example). Production: Pages → Settings → Environment variables
# or `npx wrangler pages secret put GEMINI_API_KEY`

[[d1_databases]]
binding = "DB"
database_name = "accredify-db"
database_id = "accredify-db"
migrations_dir = "drizzle"
